services:
  postgres:
    image: postgres:latest
    container_name: kairo-postgres
    environment:
      POSTGRES_USER: kairo
      POSTGRES_PASSWORD: kairo
      POSTGRES_DB: kairo
    ports:
      - "5432:5432"
    volumes:
      - kairo-postgres-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:latest
    container_name: kairo-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"

  redis:
    image: redis/redis-stack:latest
    container_name: kairo-redis
    ports:
      - "6379:6379"
      - "8001:8001"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kairo-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kairo.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  kairo-postgres-data:
