spring:
  application:
    name: kairo-api-service

  datasource:
    url: jdbc:postgresql://localhost:5432/kairo
    username: kairo
    password: kairo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
